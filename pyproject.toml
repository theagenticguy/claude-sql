[project]
name = "claude-sql"
version = "0.1.0"
description = "Zero-copy SQL + semantic search + LLM analytics over ~/.claude/ transcripts."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "Laith Al-Saadoon", email = "lalsaado@amazon.com" }
]
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.40",
    "boto3>=1.42.91",
    "cyclopts>=4.10.2",
    "duckdb>=1.5.2",
    "hdbscan>=0.8.40",
    "loguru>=0.7.3",
    "networkx>=3.4",
    "polars>=1.40.0",
    "pyarrow>=23.0.1",
    "pydantic>=2.13.2",
    "pydantic-settings>=2.13.1",
    "scikit-learn>=1.5",
    "scipy>=1.13",
    "tenacity>=9.1.4",
    "umap-learn>=0.5.12",
]

[project.scripts]
claude-sql = "claude_sql.cli:main"

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.11",
    "ty>=0.0.31",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
