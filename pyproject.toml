[project]
name = "claude-sql"
version = "0.1.0"
description = "Zero-copy SQL engine over ~/.claude/ JSONL transcripts with Cohere Embed v4 semantic search."
readme = "README.md"
authors = [
    { name = "Laith Al-Saadoon", email = "lalsaado@amazon.com" }
]
requires-python = ">=3.12"
dependencies = [
    "boto3>=1.42.91",
    "cyclopts>=4.10.2",
    "duckdb>=1.5.2",
    "loguru>=0.7.3",
    "polars>=1.40.0",
    "pyarrow>=23.0.1",
    "pydantic>=2.13.2",
    "pydantic-settings>=2.13.1",
    "tenacity>=9.1.4",
]

[project.scripts]
claude-sql = "claude_sql.cli:main"

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.11",
    "ty>=0.0.31",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
