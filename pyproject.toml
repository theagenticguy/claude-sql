[project]
name = "claude-sql"
version = "0.2.4"
description = "Zero-copy SQL + semantic search + LLM analytics over ~/.claude/ transcripts."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "Laith Al-Saadoon", email = "lalsaado@amazon.com" }
]
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.40",
    "boto3>=1.42.91",
    "cyclopts>=4.10.2",
    "duckdb>=1.5.2",
    "hdbscan>=0.8.40",
    "loguru>=0.7.3",
    "networkx>=3.4",
    "numpy>=2.4.4",
    "polars>=1.40.0",
    "pyarrow>=23.0.1",
    "pydantic>=2.13.2",
    "pydantic-settings>=2.13.1",
    "pyyaml>=6.0.3",
    "scikit-learn>=1.5",
    "scipy>=1.13",
    "tenacity>=9.1.4",
    "umap-learn>=0.5.12",
]

[project.scripts]
claude-sql = "claude_sql.cli:main"

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "commitizen>=4.13.10",
    "lefthook>=2.1.6",
    "pytest>=9.0.3",
    "ruff>=0.15.11",
    "ty>=0.0.31",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]

# ---------------------------------------------------------------------------
# Commitizen — conventional commits + version bumping.
# ---------------------------------------------------------------------------
#
# version_provider = "uv" keeps pyproject.toml[project.version] and uv.lock
# in sync on every ``cz bump``, so we don't maintain a separate
# ``__version__.py``.  update_changelog_on_bump writes CHANGELOG.md from
# commit history using the conventional-commits parser.  major_version_zero
# keeps us in 0.x until the first intentional breaking release.
[tool.commitizen]
name = "cz_conventional_commits"
version_provider = "uv"
version_scheme = "pep440"
tag_format = "v$version"
update_changelog_on_bump = true
major_version_zero = true
annotated_tag = true
changelog_incremental = true
bump_message = "chore(release): $current_version → $new_version"
