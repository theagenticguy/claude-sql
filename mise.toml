# mise-en-place configuration for claude-sql.
#
# Best-practice mise + uv combo:
#   * ``mise`` pins tool versions (Python, uv) so contributors get identical
#     interpreters without touching system Python.
#   * ``python.uv_venv_auto`` auto-creates ``.venv`` on ``cd`` and sources it
#     (v2 of the older ``_.python.venv`` idiom; uv-aware).
#   * ``uv`` manages packages + lockfile (``uv.lock``); never hand-edit deps
#     in ``pyproject.toml`` — use ``uv add``/``uv remove``.
#   * Every project command is a mise task so the ``claude-sql`` developer
#     only needs ``mise run <task>`` (no memorizing raw ``uv``/``ruff`` invocations).

min_version = "2025.1.0"

[tools]
python = "3.14"
uv = "latest"

# Security scanners installed via mise so contributors don't need brew/dnf.
# semgrep + osv-scanner ship pre-registered (aqua/pipx); betterleaks is a
# Go binary distributed via GitHub releases — `ubi:` is mise's universal
# binary installer.  bandit is a Python dev dep (uv add --group dev) so
# it lives in `.venv` alongside ruff/ty/pytest, not under [tools].
osv-scanner = "latest"
semgrep = "latest"
"aqua:betterleaks/betterleaks" = "1.2.0"

[settings]
# uv-aware venv auto-activation.  Replaces the legacy `_.python.venv` block.
python.uv_venv_auto = "create|source"

[env]
# No .pyc trash on the /efs network FS (working tree lives there).
PYTHONDONTWRITEBYTECODE = "1"
# Silence uv's hardlink-fallback warning when cache and venv are on
# different mounts — common on /efs + /home devboxes.
UV_LINK_MODE = "copy"

# ---------------------------------------------------------------------------
# Install / sync
# ---------------------------------------------------------------------------

[tasks.install]
description = "Install claude-sql (editable) + dev deps + git hooks"
depends = ["hooks:install"]
run = "uv sync --all-extras"

[tasks.upgrade]
description = "Upgrade every dependency to the latest compatible version"
run = "uv lock --upgrade && uv sync"

[tasks."lock:check"]
description = "CI freshness gate: fail if uv.lock is stale"
run = "uv lock --check"

# ---------------------------------------------------------------------------
# Git hooks (lefthook)
# ---------------------------------------------------------------------------

[tasks."hooks:install"]
description = "Install lefthook git hooks (pre-commit + commit-msg + pre-push)"
run = "uv run lefthook install"

[tasks."hooks:uninstall"]
description = "Uninstall lefthook git hooks"
run = "uv run lefthook uninstall"

[tasks."hooks:run"]
description = "Run a lefthook manually: `mise run hooks:run -- pre-commit`"
hide = true
run = "uv run lefthook run"

# ---------------------------------------------------------------------------
# Commitizen (conventional commits + version bump + changelog)
# ---------------------------------------------------------------------------

[tasks.commit]
description = "Interactive commit wizard (conventional commits)"
run = "uv run cz commit"

[tasks.bump]
description = "Bump version + changelog + git tag from conventional commits"
run = "uv run cz bump"

[tasks."bump:dry-run"]
description = "Preview what `cz bump` would do without changing anything"
run = "uv run cz bump --dry-run"

# ---------------------------------------------------------------------------
# Quality gates (run in parallel inside `mise run check`)
# `sources = [...]` makes each task skip when the source tree hasn't moved
# by mtime — ~95% speedup on docs-only re-runs, no effect on a cold run.
# ---------------------------------------------------------------------------

[tasks.lint]
description = "Lint with ruff"
sources = ["src/**/*.py", "tests/**/*.py", "pyproject.toml"]
run = "uv run ruff check ."

[tasks.fmt]
description = "Check formatting"
sources = ["src/**/*.py", "tests/**/*.py", "pyproject.toml"]
run = "uv run ruff format --check ."

[tasks."fmt:write"]
description = "Apply formatting"
run = "uv run ruff format ."

[tasks.typecheck]
description = "Type-check with ty (strict, over src/ + tests/)"
sources = ["src/**/*.py", "tests/**/*.py", "pyproject.toml"]
# pyproject [tool.ty.src.include] lists src/ + tests/; ty check (no args)
# consumes that.
run = "uv run ty check"

[tasks."lint:imports"]
description = "Enforce the hexagonal layers DAG (domain < infrastructure < application < interfaces)"
sources = ["src/**/*.py", "pyproject.toml"]
run = "uv run lint-imports"

[tasks.test]
description = "Run the full pytest suite"
sources = ["src/**/*.py", "tests/**/*.py", "pyproject.toml"]
run = "uv run pytest --no-header -q"

[tasks.proofs]
description = "Lean 4 proof layer: `lake build` under proofs/ (core Lean, no mathlib, sorry-free)"
# Track A of the two-track proof discipline (hexagonal-arch-stack.md §7).
# Each ClaudeSql/*.lean module machine-checks one pure domain invariant against
# its cited Python surface. The gate is a clean, sorry-free `lake build`.
# elan/lake are installed out-of-band (~/.elan/bin); `elan` on PATH resolves the
# proofs/lean-toolchain pin (leanprover/lean4:v4.32.0) automatically. We prepend
# ~/.elan/bin so the task works whether or not the caller's shell has elan
# activated.
sources = ["proofs/**/*.lean", "proofs/lakefile.toml", "proofs/lean-toolchain"]
dir = "proofs"
run = 'PATH="$HOME/.elan/bin:$PATH" lake build'

[tasks.check]
description = "All quality gates: lint + fmt + typecheck + import-linter + test + proofs"
depends = ["lint", "fmt", "typecheck", "lint:imports", "test", "proofs"]

# ---------------------------------------------------------------------------
# Security gates — defense-in-depth SAST/SCA + secrets sweep.  Each emits
# SARIF under .sarif/ for upload to GitHub code scanning in CI; locally
# the SARIF lives on disk for manual inspection.  All four run in
# parallel via `mise run security` and stay green on findings (--exit-zero
# / --exit-code=0) so the SARIF is always produced; gating happens in
# code scanning UI via branch protection alerts, not the scanner exit
# code.  See .erpaval/solutions/best-practices/sarif-scanner-report-vs-gate.md
# for the rationale.
# ---------------------------------------------------------------------------

[tasks."security:bandit"]
description = "Python SAST via bandit (defense-in-depth alongside ruff S)"
sources = ["src/**/*.py", "pyproject.toml"]
run = """
mkdir -p .sarif
uv run bandit -r src -f sarif -o .sarif/bandit.sarif --exit-zero -c pyproject.toml
"""

[tasks."security:semgrep"]
description = "Multi-language SAST via Semgrep (p/auto + p/owasp-top-ten)"
sources = ["src/**/*.py", "pyproject.toml"]
run = """
mkdir -p .sarif
semgrep scan \
  --config p/auto \
  --config p/owasp-top-ten \
  --sarif --output=.sarif/semgrep.sarif \
  --metrics=off || true
"""

[tasks."security:osv"]
description = "Vulnerability scan of uv.lock via osv-scanner"
sources = ["uv.lock"]
run = """
mkdir -p .sarif
osv-scanner scan source --lockfile=uv.lock --format=sarif --output=.sarif/osv.sarif || true
"""

[tasks."security:leaks"]
description = "Secrets sweep over git history via betterleaks (gitleaks successor)"
run = """
mkdir -p .sarif
betterleaks git . -f sarif -r .sarif/betterleaks.sarif --exit-code=0
"""

[tasks.security]
description = "All security scanners in parallel: bandit + semgrep + osv + leaks (SARIF under .sarif/)"
depends = ["security:bandit", "security:semgrep", "security:osv", "security:leaks"]

# ---------------------------------------------------------------------------
# Build / release
# ---------------------------------------------------------------------------

[tasks.build]
description = "Build the publishable claude-sql wheel + sdist into dist/"
# claude-sql is a single package: src/claude_sql/ holds all five layer
# sub-packages (core/analytics/evals/provenance/app) under one namespace
# root, so `uv build` produces the one self-contained wheel directly.
run = "uv build"

[tasks."tool:install"]
description = "Install claude-sql as a uv tool (global, isolated venv)"
run = "uv tool install --from . claude-sql --force --reinstall"

[tasks."tool:upgrade"]
description = "Re-install claude-sql from the current working tree (use after pulling)"
run = "uv tool install --from . claude-sql --force --reinstall"

[tasks."tool:uninstall"]
description = "Uninstall the claude-sql uv tool"
run = "uv tool uninstall claude-sql"

# ---------------------------------------------------------------------------
# CLI passthrough (so ``mise run cli -- schema`` works as shorthand)
# ---------------------------------------------------------------------------

[tasks.cli]
description = "Run the claude-sql CLI in this venv"
hide = true
run = "uv run claude-sql"
