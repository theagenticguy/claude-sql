# mise-en-place configuration for claude-sql.
#
# Best-practice mise + uv combo:
#   * ``mise`` pins tool versions (Python, uv) so contributors get identical
#     interpreters without touching system Python.
#   * ``_.python.venv`` auto-creates ``.venv`` on ``cd`` and activates it.
#   * ``uv`` manages packages + lockfile (``uv.lock``); never hand-edit deps
#     in ``pyproject.toml`` — use ``uv add``/``uv remove``.
#   * Every project command is a mise task so the ``claude-sql`` developer
#     only needs ``mise run <task>`` (no memorizing raw ``uv``/``ruff`` invocations).

[tools]
python = "3.12"
uv = "latest"

[env]
_.python.venv = { path = ".venv", create = true }

# ---------------------------------------------------------------------------
# Install / sync
# ---------------------------------------------------------------------------

[tasks.install]
description = "Install all deps from uv.lock into .venv and git hooks"
depends = ["hooks:install"]
run = "uv sync --all-extras"

[tasks.upgrade]
description = "Upgrade every dependency to the latest compatible version"
run = "uv lock --upgrade && uv sync"

# ---------------------------------------------------------------------------
# Git hooks (lefthook)
# ---------------------------------------------------------------------------

[tasks."hooks:install"]
description = "Install lefthook git hooks (pre-commit + commit-msg + pre-push)"
run = "uv run lefthook install"

[tasks."hooks:uninstall"]
description = "Uninstall lefthook git hooks"
run = "uv run lefthook uninstall"

[tasks."hooks:run"]
description = "Run a lefthook manually: `mise run hooks:run -- pre-commit`"
run = "uv run lefthook run"

# ---------------------------------------------------------------------------
# Commitizen (conventional commits + version bump + changelog)
# ---------------------------------------------------------------------------

[tasks.commit]
description = "Interactive commit wizard (conventional commits)"
run = "uv run cz commit"

[tasks.bump]
description = "Bump version + changelog + git tag from conventional commits"
run = "uv run cz bump"

[tasks."bump:dry-run"]
description = "Preview what `cz bump` would do without changing anything"
run = "uv run cz bump --dry-run"

[tasks.changelog]
description = "Regenerate CHANGELOG.md from commit history"
run = "uv run cz changelog"

# ---------------------------------------------------------------------------
# Quality gates (run in parallel inside `mise run check`)
# ---------------------------------------------------------------------------

[tasks.lint]
description = "Lint with ruff"
run = "uv run ruff check ."

[tasks.fmt]
description = "Check formatting"
run = "uv run ruff format --check ."

[tasks."fmt:write"]
description = "Apply formatting"
run = "uv run ruff format ."

[tasks.typecheck]
description = "Type-check with ty"
run = "uv run ty check src/"

[tasks.test]
description = "Run the full pytest suite"
run = "uv run pytest tests/ --no-header -q"

[tasks.check]
description = "All quality gates: lint + fmt + typecheck + test"
depends = ["lint", "fmt", "typecheck", "test"]

# ---------------------------------------------------------------------------
# Build / release
# ---------------------------------------------------------------------------

[tasks.build]
description = "Build wheel + sdist into dist/"
run = "uv build"

[tasks."tool:install"]
description = "Install claude-sql as a uv tool (global, isolated venv)"
run = "uv tool install --from . claude-sql --force --reinstall"

[tasks."tool:upgrade"]
description = "Re-install claude-sql from the current working tree (use after pulling)"
run = "uv tool install --from . claude-sql --force --reinstall"

[tasks."tool:uninstall"]
description = "Uninstall the claude-sql uv tool"
run = "uv tool uninstall claude-sql"

# ---------------------------------------------------------------------------
# CLI passthrough (so ``mise run cli -- schema`` works as shorthand)
# ---------------------------------------------------------------------------

[tasks.cli]
description = "Run the claude-sql CLI in this venv"
run = "uv run claude-sql"
