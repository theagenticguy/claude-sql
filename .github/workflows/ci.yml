name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-claude-sql
      - run: uv run ruff check .

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-claude-sql
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-claude-sql
      - run: uv run ty check src/ tests/

  lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: uv lock --check

  changelog-check:
    # Drift detector for CHANGELOG.md vs commitizen's projection.
    #
    # ``cz changelog --incremental`` re-renders the "Unreleased" section
    # from conventional-commit messages and prepends to CHANGELOG.md.
    # On a clean tree where the changelog is current with main, the
    # incremental rewrite is a no-op. Hand-edits, missed ``mise run
    # bump``, or malformed commit subjects produce a diff and fail.
    #
    # We need full history (fetch-depth: 0) so cz can compute deltas
    # back to the prior tag.
    #
    # **PR-only by design.** GitHub's squash-merge appends ``(#NNN)``
    # to the merged commit subject, so the canonical CHANGELOG.md
    # entry on main shifts from the form the PR author committed.
    # Running this check on push-to-main would therefore fail every
    # squash-merge until a follow-up PR re-rendered — recursive churn
    # for a benign mechanical drift. Restricting to ``pull_request``
    # keeps the gate honest where it matters (PR author forgot to
    # update CHANGELOG) without policing main. The post-merge
    # changelog-fixup workflow handles the squash-merge drift on main.
    #
    # **Release-PR carve-out.** ``cz bump`` writes a new ``## vX.Y.Z``
    # header to CHANGELOG.md before the matching tag exists. Running
    # ``cz changelog --incremental`` on that branch fails with "No
    # tag found to do an incremental changelog". The release PR's
    # CHANGELOG was already canonical when cz wrote it; skip the
    # gate entirely when the PR title starts with ``chore(release):``.
    if: >-
      github.event_name == 'pull_request' &&
      !startsWith(github.event.pull_request.title, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-claude-sql
      - name: Snapshot CHANGELOG.md
        run: cp CHANGELOG.md CHANGELOG.md.before
      - name: Re-render via commitizen
        run: uv run cz changelog --incremental
      - name: Normalize squash-merge ``(#NNN)`` suffix on both sides
        # Each PR's own commit subject is plain (no ``(#NNN)`` yet) but
        # cz pulls prior PR entries from history that DO carry the
        # suffix. Strip it on both sides before diffing so the gate
        # only fires when the *content* of the entry diverges.
        run: |
          sed -i -E 's/ \(#[0-9]+\)$//' CHANGELOG.md.before CHANGELOG.md
      - name: Verify no drift
        run: |
          if ! diff -u CHANGELOG.md.before CHANGELOG.md > /tmp/changelog.diff; then
            echo "::error::CHANGELOG.md is out of sync with commit history."
            echo "Run 'mise run changelog' locally and commit the result."
            echo "----- diff (cz would write):"
            cat /tmp/changelog.diff
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # tokenless Codecov OIDC upload
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-claude-sql
      - name: pytest (+coverage)
        run: uv run pytest tests/ --no-header -q --cov=src --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
