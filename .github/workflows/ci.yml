name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-claude-sql
      - run: uv run ruff check .

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-claude-sql
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-claude-sql
      # ty config drives paths via [tool.ty.environment].root + [tool.ty.src].include
      - run: uv run ty check

  lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: uv lock --check

  proofs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Lean 4 proof layer (Track A): machine-checked domain invariants under
      # proofs/. Mirrors the local `mise run proofs` gate (lake build, core
      # Lean only, no mathlib). lean-action installs elan per
      # proofs/lean-toolchain and caches .lake keyed on toolchain + manifest.
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: proofs
          auto-config: "false"
          build: "true"
          test: "false"
          lint: "false"
          use-mathlib-cache: "false"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # tokenless Codecov OIDC upload
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-claude-sql
      - name: pytest (+coverage)
        # pytest config drives paths via [tool.pytest.ini_options].testpaths;
        # --cov=src covers the single claude-sql package tree.
        run: uv run pytest --no-header -q --cov=src --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
