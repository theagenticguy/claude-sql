name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-claude-sql
      - run: uv run ruff check .

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-claude-sql
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-claude-sql
      # ty config drives paths via [tool.ty.environment].root + [tool.ty.src].include
      - run: uv run ty check

  lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: uv lock --check

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # tokenless Codecov OIDC upload
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-claude-sql
      - name: pytest (+coverage)
        # pytest config drives paths via [tool.pytest.ini_options].testpaths;
        # --cov=packages walks every workspace member's src.
        run: uv run pytest --no-header -q --cov=packages --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
