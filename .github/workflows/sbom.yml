name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: uv sync --locked --all-extras --all-groups
      - name: Generate CycloneDX SBOM from .venv
        # cdxgen does not support uv.lock (it understands requirements.txt,
        # setup.py, pyproject.toml, poetry.lock), and `uv export` has no
        # --format cyclonedx flag.  cyclonedx-python ships a first-class
        # `environment` adapter that walks the installed .venv and emits
        # the resolved dep graph — exactly what we want.
        run: |
          uvx --from cyclonedx-bom cyclonedx-py environment .venv \
            --output-format JSON \
            --schema-version 1.6 \
            --outfile SBOM.cdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: SBOM.cdx.json
      - name: Attach SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" SBOM.cdx.json --clobber
