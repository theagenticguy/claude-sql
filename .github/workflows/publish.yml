name: Publish

# Astral's recommended uv-native publish flow:
#
#   1. ``uv build`` produces sdist + wheel under ``dist/``.
#   2. Smoke test BOTH artifacts via ``uv run --isolated --no-project
#      --with dist/<name>.{whl,tar.gz} claude-sql --version``. The
#      isolated env catches missing transitive deps (e.g. an import
#      that worked locally because uv pulled the dep transitively
#      but isn't declared in [project].dependencies).
#   3. ``uv publish [--index testpypi]`` uploads via OIDC. uv reads
#      the GitHub Actions OIDC token automatically when the job has
#      ``id-token: write`` and an ``environment:`` block — no
#      explicit ``--token`` flag needed.
#
# Two paths:
#
# - ``release: types: [published]`` → publish-pypi job → uploads to
#   https://pypi.org/p/claude-sql. Same trigger as sbom.yml so a
#   release publishes the wheel + SBOM in one motion.
#
# - ``workflow_dispatch`` with ``target ∈ {testpypi, pypi}`` → either
#   publish-testpypi (dry-run) or publish-pypi (manual production).
#
# Trusted Publisher entries on pypi.org and test.pypi.org must list:
#   * Owner / repo: theagenticguy / claude-sql
#   * Workflow filename: publish.yml
#   * Environment name: pypi (production) / testpypi (dry-run)
#
# References:
#   * https://docs.astral.sh/uv/guides/integration/github/#publishing-to-pypi
#   * https://docs.astral.sh/uv/guides/package/#publishing-your-package
#   * https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3   # v8.3.0
      - name: Install Python 3.13
        run: uv python install 3.13
      # claude-sql is a single package (src/claude_sql/ with five layer
      # sub-packages under one namespace root), so `uv build` produces the
      # one self-contained wheel + sdist directly. The smoke tests below
      # catch any missing transitive dep on a clean isolated install.
      - name: Build
        run: uv build
      # Smoke-test BOTH artifacts: a missing transitive dep manifests
      # only on a clean install, not in the dev venv. Running
      # ``claude-sql --version`` exercises the full import graph
      # (every CLI command imports the worker modules eagerly), so an
      # ImportError surfaces here instead of post-publish in user space.
      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl claude-sql --version
      - name: Smoke test (sdist)
        run: uv run --isolated --no-project --with dist/*.tar.gz claude-sql --version
      - name: Upload dist as artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/claude-sql
    permissions:
      id-token: write   # Trusted Publishing OIDC
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3   # v8.3.0
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      # ``--index testpypi`` resolves to ``[[tool.uv.index]]`` in
      # pyproject.toml. ``--check-url`` is implicit when an index is
      # named: uv skips files already at the registry, making
      # rerun-on-failure idempotent.
      - name: Publish to TestPyPI
        run: uv publish --index testpypi

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/claude-sql
    permissions:
      id-token: write   # Trusted Publishing OIDC
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3   # v8.3.0
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        run: uv publish
