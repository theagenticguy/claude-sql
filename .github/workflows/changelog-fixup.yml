name: Changelog Fixup

# Why this workflow exists
# ------------------------
# When a PR with multiple conventional commits squash-merges into main,
# GitHub collapses the N commits into a single ``feat: X (#NNN)`` line.
# But ``cz changelog`` (run inside the PR before merge) recorded the
# *pre-squash* commits as separate Feat/Fix/etc. entries. Once the PR
# lands, ``cz changelog`` regenerated against the post-squash history
# produces a different result — and the next innocent PR's CI fails the
# changelog-check drift gate.
#
# Per-occurrence example: PR #37 squash-merged 3 commits (feat + fix +
# docs). The committed CHANGELOG.md listed all 3 separately. ``cz
# changelog`` on main wanted to collapse them into one. Dependabot PR
# #35's changelog-check tripped on that drift, blocking the merge.
#
# This workflow detects the drift on every push to main and opens an
# auto-PR with the corrected CHANGELOG.md so the next PR isn't blocked.
#
# Skip rules
# ----------
# * Skip on ``chore(release):`` head-commits — ``cz bump`` already
#   wrote a canonical CHANGELOG entry; the gate would fight it.
# * Skip when the head commit is itself the auto-fixup PR being merged
#   back in (head subject prefix ``docs(changelog): post-merge
#   regenerate``); avoids an infinite loop.

on:
  push:
    branches: [main]

concurrency:
  # Only one fixup run at a time on main; if a second push arrives
  # while one is still re-rendering, cancel the older one — the newer
  # commit's drift state supersedes.
  group: changelog-fixup-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  fixup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # peter-evans/create-pull-request needs a token that can push
          # branches; the default GITHUB_TOKEN is sufficient because we
          # declared ``contents: write`` + ``pull-requests: write`` above.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if release-bump or our own fixup
        id: skip
        run: |
          subject=$(git log -1 --format=%s HEAD)
          if [[ "$subject" == "chore(release):"* ]]; then
            echo "Skipping: release commit"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$subject" == "docs(changelog): post-merge regenerate"* ]]; then
            echo "Skipping: fixup of our own fixup"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - if: steps.skip.outputs.skip == 'false'
        uses: ./.github/actions/setup-claude-sql

      - if: steps.skip.outputs.skip == 'false'
        name: Re-render CHANGELOG.md
        run: |
          cp CHANGELOG.md CHANGELOG.md.before
          uv run cz changelog --incremental
          # Apply the same ``(#NNN)`` normalization the changelog-check
          # gate applies, so the fixup PR doesn't churn on benign
          # squash-merge suffix differences.
          sed -i -E 's/ \(#[0-9]+\)$//' CHANGELOG.md.before CHANGELOG.md.normalized || true
          # diff against the un-normalized re-render: if the substantive
          # content differs, propose the fixup; if only ``(#NNN)``
          # differs, no fixup needed.
          if diff -u CHANGELOG.md.before CHANGELOG.md > /dev/null; then
            echo "No drift detected"
            echo "drift=false" >> "$GITHUB_ENV"
          else
            echo "Drift detected — will open PR"
            echo "drift=true" >> "$GITHUB_ENV"
          fi
          rm -f CHANGELOG.md.before CHANGELOG.md.normalized

      - if: steps.skip.outputs.skip == 'false' && env.drift == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Pin the bot identity so Conventional Commits & lefthook
          # checks see a clean author shape.
          commit-message: |
            docs(changelog): post-merge regenerate after ${{ github.event.head_commit.id }}

            Auto-generated by .github/workflows/changelog-fixup.yml.
            ``cz changelog`` regenerated content differs from the
            committed CHANGELOG.md — this PR closes the drift so the
            next PR's changelog-check gate stays green.
          title: "docs(changelog): post-merge regenerate"
          body: |
            ${{ github.event.head_commit.message }} caused a CHANGELOG.md
            drift (squash-merge collapsed multi-commit PR entries). This
            PR is auto-generated to close the drift.

            Trigger commit: ${{ github.event.head_commit.id }}

            Merge to keep `changelog-check` green for downstream PRs.
          branch: chore/changelog-fixup
          delete-branch: true
          labels: automation,changelog
          # Don't sign automated commits with the user's gpg key.
          # peter-evans/create-pull-request defaults to the
          # github-actions[bot] author shape, which works with the
          # commit-msg lefthook hook because the message above starts
          # with ``docs(changelog):`` (a valid conventional type).
