[project]
name = "claude-sql-core"
version = "1.1.0"
description = "claude-sql kernel: settings, DuckDB views, output, logging, schemas, Bedrock primitives."
readme = "../../README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Laith Al-Saadoon", email = "lalsaado@amazon.com" }]
requires-python = ">=3.13"
dependencies = [
    "anthropic>=0.40",
    "boto3>=1.42.91",
    "duckdb>=1.5.2,<2",
    "lancedb>=0.30,<0.31",
    "loguru>=0.7.3",
    "polars>=1.40.0",
    "pyarrow>=23.0.1",
    "pydantic>=2.13.2",
    "pydantic-settings>=2.13.1",
    "pyyaml>=6.0.3",
    "tenacity>=9.1.4",
    "tiktoken>=0.12.0",
]

[build-system]
requires = ["uv_build>=0.11.14,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "claude_sql.core"
