[project]
name = "claude-sql-evals"
version = "1.0.1"
description = "claude-sql eval gym: cross-lineage Bedrock judge panels with pre-registered manifests, blind handover, kappa floor."
readme = "../../README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Laith Al-Saadoon", email = "lalsaado@amazon.com" }]
requires-python = ">=3.13"
dependencies = [
    "claude-sql-core",
]

[build-system]
requires = ["uv_build>=0.11.14,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "claude_sql.evals"
