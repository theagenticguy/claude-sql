[project]
name = "claude-sql-analytics"
version = "1.1.0"
description = "claude-sql analytics: embed, classify, trajectory, conflicts, friction, cluster, terms, community, ingest."
readme = "../../README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Laith Al-Saadoon", email = "lalsaado@amazon.com" }]
requires-python = ">=3.13"
dependencies = [
    "claude-sql-core",
    "anyio>=4.13.0",
    "hdbscan>=0.8.40",
    "igraph>=1.0.0,<2.0",
    "leidenalg>=0.11.0,<0.12",
    "numpy>=2.4.4",
    "scikit-learn>=1.5",
    "scipy>=1.13",
    "umap-learn>=0.5.12",
]

[build-system]
requires = ["uv_build>=0.11.14,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "claude_sql.analytics"
