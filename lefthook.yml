# Lefthook — Git hooks runner.  Installed by ``mise run hooks:install`` and
# activated by ``uv run lefthook install`` once per clone.
#
# Invariants:
#   * Every hook runs inside the project's uv venv via ``{uv}`` so
#     contributors don't need system-wide ruff / ty / cz installs.
#   * Pre-commit jobs run in parallel and are scoped to staged files via
#     ``{staged_files}`` so partial commits stay fast.
#   * ``stage_fixed: true`` on the formatter so auto-fixes land in the commit
#     instead of the working tree.
#   * Commitizen validates every commit message against
#     conventional-commits; bypass with ``git commit --no-verify`` only in
#     the rare case you need to land a WIP.
#
# Uninstall: ``uv run lefthook uninstall``.

min_version: 2.1.6
assert_lefthook_installed: true
glob_matcher: doublestar

# Keep stderr clean for the green path; preserve failure detail.
output:
  - meta
  - summary
  - failure
  - execution_info

templates:
  uv: uv run

pre-commit:
  parallel: true
  jobs:
    - name: ruff-lint
      run: "{uv} ruff check --fix {staged_files}"
      glob: "**/*.py"
      stage_fixed: true
      priority: 1
      fail_text: "ruff check failed — fix the lint errors above, then re-stage."

    - name: ruff-format
      run: "{uv} ruff format {staged_files}"
      glob: "**/*.py"
      stage_fixed: true
      priority: 2
      fail_text: "ruff format failed — check the error above."

    # ``ty`` runs over every workspace member's ``src/`` + ``tests/`` tree.
    # Python type-checking is semantic — changing one file can break imports
    # elsewhere.  pyproject [tool.ty.src.include] enumerates the paths;
    # ``ty check`` (no args) consumes that list.
    - name: ty
      run: "{uv} ty check"
      glob: "**/*.py"
      priority: 3
      skip:
        - merge
        - rebase
      fail_text: "ty typecheck failed — run `mise run typecheck` locally to reproduce."

    # Hexagonal DAG enforcement: interfaces > application > infrastructure >
    # domain, plus a forbidden contract fencing the transitional `core` package
    # out of the driving layers. Pre-commit catches accidental cross-layer
    # imports the moment they're staged. Fast — pure import-graph walk.
    - name: lint-imports
      run: "{uv} lint-imports"
      glob: "**/*.py"
      priority: 4
      skip:
        - merge
        - rebase
      fail_text: "import-linter contract failed — review the layered DAG."

    # Catches the 'bumped pyproject.toml but forgot to regenerate uv.lock'
    # drift.  ms-scale check — only fires when pyproject.toml or uv.lock
    # is actually staged.
    - name: uv-lock-sync
      run: uv lock --check
      glob: "{pyproject.toml,uv.lock}"
      priority: 4
      fail_text: "uv.lock is stale — run `uv lock` then re-stage."

commit-msg:
  jobs:
    # ``cz check --commit-msg-file`` validates the message against the
    # configured rule (conventional commits).  ``--allow-abort`` lets an
    # empty message (e.g. when aborting a commit) pass through.
    - name: commitizen
      run: "{uv} cz check --allow-abort --commit-msg-file {1}"
      interactive: false
      fail_text: "Commit message is not conventional — run `mise run commit` for the wizard."

pre-push:
  jobs:
    # Full test suite on push is a safety net: pre-commit only runs the
    # linters, not pytest.  Pushing without a green test pass is almost
    # always a mistake on this project.  ``files:`` gates whether the glob
    # matches — on first push of a branch ``@{push}`` resolves to the
    # configured remote default; if that fails, lefthook skips cleanly
    # rather than fabricating a diff.
    - name: pytest
      run: "{uv} pytest --no-header -q"
      glob: "**/*.py"
      # Prefer ``@{push}`` (configured upstream) but fall back to ``HEAD~``
      # so the first push of a new branch still gates on pytest instead of
      # the whole-branch pytest failing with git exit 128.
      files: "git diff --name-only @{push} HEAD || git diff --name-only HEAD~"
      skip:
        - merge
        - rebase
      fail_text: "pytest failed — run `mise run test` locally before pushing."
