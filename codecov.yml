# Codecov gate configuration.
#
# project: allow small dips (threshold 1%) so structural refactors that add
# thin adapter/wiring surface (e.g. the v2 hexagonal reshape: -0.78%) don't
# red-x the PR while real regressions (>1%) still fail.
# patch: unchanged — new code keeps the default target so every PR's diff
# must be well covered.
coverage:
  status:
    project:
      default:
        threshold: 1%
    patch:
      default:
        target: auto
